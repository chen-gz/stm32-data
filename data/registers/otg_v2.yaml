      description: XFRC.
      bit_offset: 0
      bit_size: 1
    - name: EPDISD
      description: EPDISD.
      bit_offset: 1
      bit_size: 1
    - name: AHBERR
      description: AHBERR.
      bit_offset: 2
      bit_size: 1
    - name: STUP
      description: STUP.
      bit_offset: 3
      bit_size: 1
    - name: OTEPDIS
      description: OTEPDIS.
      bit_offset: 4
      bit_size: 1
    - name: STSPHSRX
      description: STSPHSRX.
      bit_offset: 5
      bit_size: 1
    - name: B2BSTUP
      description: B2BSTUP.
      bit_offset: 6
      bit_size: 1
    - name: OUTPKTERR
      description: OUTPKTERR.
      bit_offset: 8
      bit_size: 1
    - name: BNA
      description: BNA.
      bit_offset: 9
      bit_size: 1
    - name: BERR
      description: BERR.
      bit_offset: 12
      bit_size: 1
    - name: NAK
      description: NAK.
      bit_offset: 13
      bit_size: 1
    - name: NYET
      description: NYET.
      bit_offset: 14
      bit_size: 1
